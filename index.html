<body>

<header>
    <h1>Royal Hotel & Restaurant</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="rooms.html">Rooms</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.php">Contact</a>
    </nav>
</header>

<section class="hero">
    <div class="hero-overlay">
        <h2 class="hero-title">Royal Hotel & Restaurant</h2>
        <p class="hero-subtitle">Comfort • Luxury • Affordable</p>
        <button class="open-booking" onclick="openBooking()">✨ Book Now</button>

    </div>
</section>


<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<div class="section-title">
    <h2>Hotel Facilities</h2>
    <span></span>
</div>

<section class="features">
    <div class="feature-card wifi">
        <i class="fa-solid fa-wifi"></i>
        <h3>Free Wi-Fi</h3>
    </div>

    <div class="feature-card service">
        <i class="fa-solid fa-headset"></i>
        <h3>24×7 Service</h3>
    </div>

    <div class="feature-card food">
        <i class="fa-solid fa-utensils"></i>
        <h3>Restaurant</h3>
    </div>

    <div class="feature-card parking">
        <i class="fa-solid fa-car"></i>
        <h3>Parking</h3>
    </div>

    <div class="feature-card lift">
        <i class="fa-solid fa-elevator"></i>
        <h3>Elevator</h3>
    </div>
</section>


<footer>
    <p>© 2024 Royal Hotel</p>
</footer>

<div id="bookingModal" class="booking-modal">
    <div class="booking-content">
        <span class="close-btn" onclick="closeBooking()">×</span>

        <form class="booking-form" action="book.php" method="POST">
            <h2>Book Your Stay</h2>

            <div class="form-row">
                <input type="text" name="name" placeholder="Full Name" required>
                <input type="email" name="email" placeholder="Email" required>
            </div>

            <div class="form-row">
                <input type="tel" name="phone" placeholder="Phone Number" required>
                <input type="number" name="persons" placeholder="Guests" min="1" required>
            </div>

            <div class="form-row">
                <div class="field">
                    <label>Check-in Date</label>
                    <input type="date" name="checkin" required>
                </div>


                <div class="field">
                    <label>Check-out Date</label>
                    <input type="date" name="checkout" required>
                </div>
            </div>

            <div class="form-row">
                <select name="room"
                    onchange="checkAvailability(); calculatePrice();"
                    required>
                    <option value="">Select Room</option>
                    <option>Single Room</option>
                    <option>Double Room</option>
                    <option>Deluxe Room</option>
                    <option>King Room</option>
                </select>

                <p id="availabilityMsg" style="font-weight:600;"></p>
                <p id="priceBox" style="font-weight:bold;"></p>

                <select name="rooms" onchange="calculatePrice()" required>

                    <option value="">Rooms</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                </select>
            </div>

            


            <button type="submit" class="book-btn">Confirm Booking</button>
        </form>
    </div>
</div>
<script src="js/script.js"></script>

</body>
</html>
